<!-- ===========================

=========================== -->

<section class="detail-top">

    <div class="container">

        <a href="#" class="back-btn" id="backBtn">
            <i class="fa-solid fa-arrow-left"></i>

<span id="backText"></span>
        </a>

        <div class="detail-grid">

            <!-- BOOK COVER -->

            <div class="book-cover-wrap">

                <img
                    id="bookImage"
                    src=""
                    alt="Book Cover">

            </div>


            <!-- ===========================
     BOOK INFO
=========================== -->

<div class="book-info">

    <span class="detail-badge">
        BOOK DETAIL
    </span>

    <h1 id="bookTitle"></h1>

    <p class="book-author">
        <i class="fa-solid fa-user"></i>
        <span id="bookAuthor"></span>
    </p>

    <p class="book-series">
        <i class="fa-solid fa-book"></i>
        <span id="bookSeries"></span>
    </p>

    <div class="detail-tags">

        <span
            class="category-tag"
            id="bookCategory">
        </span>

        <span
            class="ar-tag"
            id="bookAR">
        </span>

    </div>


    <!-- ===========================
         AUDIO PLAYER
    ============================ -->

    <div class="audio-player">

        <h3>
            <i class="fa-solid fa-headphones"></i>
            원서 음원 듣기
        </h3>

        <audio
            id="bookAudio"
            controls
            preload="metadata"
            controlsList="nodownload">

            <source
                id="audioSource"
                src=""
                type="audio/mpeg">

            브라우저가 Audio를 지원하지 않습니다.

        </audio>

    </div>

</div>

        </div>

    </div>
