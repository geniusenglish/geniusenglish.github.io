<style>

/* ===========================
   VOCA HERO
=========================== */

.voca-hero{

    max-width:1000px;
    margin:60px auto 40px;
    padding:50px;

    background:#fff;

    border-radius:20px;

    display:flex;
    align-items:center;
    gap:60px;

    box-shadow:0 8px 25px rgba(0,0,0,.08);

}

.voca-book{

    flex:0 0 220px;
    text-align:center;

}

.voca-book img{

    width:200px;

    border-radius:15px;

    box-shadow:0 15px 35px rgba(0,0,0,.15);

}

.voca-info{

    flex:1;

}

.voca-info h1{

    font-size:46px;

    margin-bottom:20px;

    color:#222;

}

.voca-info p{

    font-size:20px;

    color:#666;

    line-height:1.8;

    margin-bottom:30px;

}

.back-btn{

    display:inline-block;

    background:#E53935;

    color:#fff;

    text-decoration:none;

    padding:12px 24px;

    border-radius:50px;

    font-weight:600;

    transition:.25s;

}

.back-btn:hover{

    background:#C62828;

}

@media(max-width:768px){

.voca-hero{

    flex-direction:column;
    text-align:center;

    gap:30px;

    padding:35px 25px;

}

.voca-book{

    flex:none;

}

.voca-book img{

    width:160px;

}

.voca-info h1{

    font-size:32px;

}

.voca-info p{

    font-size:17px;

}

.day-card{

    flex-direction:column;

    gap:15px;

    text-align:center;

}

audio{

    width:100%;

}

}

</style>

</head>

<section class="voca-hero">

    <div class="voca-book">
        <img src="../images/vocabulary/starter1.png" alt="능률 VOCA 초등 기본">
    </div>

    <div class="voca-info">

        <h1>능률 VOCA 초등 기본</h1>

        <p>
            매일 10~15분 듣기로<br>
            발음과 철자를 함께 익혀보세요.

<section class="day-list" id="dayList">

</section>


<!-- Footer -->

<footer class="bg-red-600 text-white text-center py-8">
© 2026 Genius English Academy
</footer>



<script>
const folder = "starter1";
const totalDays = 39;

// 음원이 없는 DAY
const skipDays = [5, 10, 15, 20, 25, 30, 35];

const list = document.getElementById("dayList");

for (let i = 1; i <= totalDays; i++) {

    // 음원이 없는 DAY는 건너뛰기
    if (skipDays.includes(i)) continue;

    const day = i.toString().padStart(2, "0");

    list.innerHTML += `
        <div class="day-card">
            <div class="day-title">DAY ${day}</div>

            <audio controls preload="none">
                <source src="../audio/${folder}/day${i}.mp3" type="audio/mpeg">
                브라우저가 오디오를 지원하지 않습니다.
            </audio>
        </div>
    `;
}
</script>
