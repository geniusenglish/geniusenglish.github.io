<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>능률 VOCA 초등 기본 | Genius English</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
    background:#f7f8fb;
}

.hero{
    max-width:1100px;
    margin:60px auto 30px;
    text-align:center;
    padding:0 20px;
}

.hero img{
    width:180px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.hero h1{
    margin-top:25px;
    font-size:40px;
    color:#222;
}

.hero p{
    margin-top:10px;
    color:#777;
    font-size:18px;
    line-height:1.7;
}

.day-list{

    max-width:900px;
    margin:50px auto 80px;
    padding:0 20px;

}

.day-card{

    background:#fff;

    border-radius:15px;

    padding:20px 25px;

    margin-bottom:18px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 5px 18px rgba(0,0,0,.08);

    transition:.25s;

}

.day-card:hover{

    transform:translateY(-3px);

    box-shadow:0 12px 30px rgba(0,0,0,.12);

}

.day-title{

    font-size:22px;

    font-weight:bold;

    color:#333;

}

audio{

    width:340px;

}

@media(max-width:768px){

.hero h1{

    font-size:30px;

}

.hero img{

    width:150px;

}

.day-card{

    flex-direction:column;

    gap:15px;

    text-align:center;

}

audio{

    width:100%;

}

}

</style>

</head>

<body>

<!-- Header -->
<header>

<!-- 메인 header 붙여넣기 -->

</header>

<section class="hero">

<img src="images/vocacover_1.png">

<h1>능률 VOCA 초등 기본</h1>

<p>

매일 10~15분 듣기로<br>

발음과 철자를 함께 익혀보세요.

</p>

</section>


<section class="day-list" id="dayList">

</section>


<!-- Footer -->

<footer>

<!-- 메인 footer 붙여넣기 -->

</footer>



<script>
const folder = "starter1";
const totalDays = 39;

// 음원이 없는 DAY
const skipDays = [5, 10, 15, 20, 25, 30, 35];

const list = document.getElementById("dayList");

for (let i = 1; i <= totalDays; i++) {

    // 음원이 없는 DAY는 건너뛰기
    if (skipDays.includes(i)) continue;

    const day = i.toString().padStart(2, "0");

    list.innerHTML += `
        <div class="day-card">
            <div class="day-title">DAY ${day}</div>

            <audio controls preload="none">
                <source src="../audio/${folder}/day${i}.mp3" type="audio/mpeg">
                브라우저가 오디오를 지원하지 않습니다.
            </audio>
        </div>
    `;
}
</script>

</body>

</html>
